name: Sync MCAT data

# Pulls the latest MCAT study log from Notion and commits data/mcat.json.
# GitHub Pages then redeploys automatically with the fresh data.
on:
  schedule:
    - cron: '0 7,13,19,1 * * *'   # every 6 hours (UTC) — ~4x/day
  workflow_dispatch:                # lets you run it on demand from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/**'                # re-sync if the parser changes
      - '.github/workflows/sync-mcat.yml'

permissions:
  contents: write

concurrency:
  group: sync-mcat
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Fetch from Notion → data/mcat.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/fetch-notion.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/mcat.json; then
            echo "No changes to data/mcat.json."
          else
            git add data/mcat.json
            git commit -m "chore: sync MCAT data from Notion [skip ci]"
            git push
            echo "Pushed updated data/mcat.json."
          fi
